<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Check USDC Balance</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/web3/1.6.1/web3.min.js"></script>
</head>
<body>
    <h1>Check USDC Balance</h1>
    <input type="text" id="walletAddress" placeholder="Enter wallet address" />
    <button id="checkBalance">Check Balance</button>
    <p id="balance"></p>

    <script>
        const usdcAddress = '0x833589fCD6eDb6E08f4c7C32D4f71b54bdA02913';
        const rpcUrl = 'https://virtual.base.rpc.tenderly.com';
        let web3;

        window.addEventListener('load', async () => {
            if (window.ethereum) {
                web3 = new Web3(window.ethereum);
                try {
                    await window.ethereum.request({ method: 'eth_requestAccounts' });
                    console.log("MetaMask connected successfully!");
                } catch (error) {
                    console.error("User denied MetaMask connection:", error.message);
                    alert("Please connect MetaMask to use this application!");
                }
            } else {
                alert('MetaMask is not installed! Please install it to proceed.');
            }
        });

        document.getElementById('checkBalance').addEventListener('click', async () => {
            const walletAddress = document.getElementById('walletAddress').value;

            // تحقق من صحة عنوان المحفظة المُدخل
            if (!web3.utils.isAddress(walletAddress)) {
                alert("Invalid wallet address! Please provide a valid Ethereum address.");
                return;
            }

            try {
                const contract = new web3.eth.Contract([
                    {
                        "constant": true,
                        "inputs": [{ "name": "_owner", "type": "address" }],
                        "name": "balanceOf",
                        "outputs": [{ "name": "balance", "type": "uint256" }],
                        "payable": false,
                        "stateMutability": "view",
                        "type": "function"
                    }
                ], usdcAddress);

                // جلب الرصيد من العقد الذكي
                const balance = await contract.methods.balanceOf(walletAddress).call();
                const formattedBalance = web3.utils.fromWei(balance, 'mwei');
                document.getElementById('balance').innerText = `Balance: ${formattedBalance} USDC`;

            } catch (error) {
                console.error("Error fetching balance:", error.message);
                document.getElementById('balance').innerText = 'Error: Unable to fetch balance.';
            }
        });
    </script>
</body>
</html>
