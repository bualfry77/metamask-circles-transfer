<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Check USDC Balance</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/web3/1.6.1/web3.min.js"></script>
</head>
<body>
    <h1>Check USDC Balance</h1>
    <input type="text" id="walletAddress" placeholder="Enter wallet address" />
    <button id="checkBalance">Check Balance</button>
    <p id="balance"></p>

    <script>
        const usdcAddress = '0x833589fCD6eDb6E08f4c7C32D4f71b54bdA02913';
        const rpcUrl = 'https://virtual.base.rpc.tenderly.com';
        let web3;

        window.addEventListener('load', async () => {
            if (window.ethereum) {
                web3 = new Web3(window.ethereum);
                await window.ethereum.request({ method: 'eth_requestAccounts' });
            } else {
                alert('Please install MetaMask!');
            }
        });

        document.getElementById('checkBalance').addEventListener('click', async () => {
            const walletAddress = document.getElementById('walletAddress').value;
            const contract = new web3.eth.Contract([
                {
                    "constant": true,
                    "inputs": [
                        {
                            "name": "",
                            "type": "address"
                        }
                    ],
                    "name": "balanceOf",
                    "outputs": [
                        {
                            "name": "",
                            "type": "uint256"
                        }
                    ],
                    "payable": false,
                    "stateMutability": "view",
                    "type": "function"
                }
            ], usdcAddress);

            try {
                const balance = await contract.methods.balanceOf(walletAddress).call();
                document.getElementById('balance').innerText = `Balance: ${web3.utils.fromWei(balance, 'mwei')} USDC`;
            } catch (error) {
                document.getElementById('balance').innerText = 'Error: ' + error.message;
            }
        });
    </script>
</body>
</html>
