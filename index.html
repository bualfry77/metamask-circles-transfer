<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MetaMask → Circles USDC Transfer</title>
    <style>
      body {
        font-family: monospace;
        background: #1a1a2e;
        color: #e0e0e0;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
        padding: 1rem;
        box-sizing: border-box;
      }
      #app {
        text-align: center;
        max-width: 600px;
      }
      h1 { color: #f6851b; }
      pre {
        background: #0f0f23;
        padding: 1rem;
        border-radius: 8px;
        text-align: left;
        overflow: auto;
        max-height: 400px;
        font-size: 0.85rem;
      }
      button {
        background: #f6851b;
        color: #fff;
        border: none;
        border-radius: 6px;
        padding: 0.75rem 2rem;
        font-size: 1rem;
        font-family: monospace;
        cursor: pointer;
        margin-bottom: 1rem;
      }
      button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <h1>MetaMask → Circles USDC Transfer</h1>
      <p>Click the button below to connect MetaMask and transfer 19,800 USDC.</p>
      <button id="transfer-btn">Connect &amp; Transfer</button>
      <pre id="output">Ready. Click "Connect &amp; Transfer" to begin.</pre>
    </div>
    <script type="module" src="/src/index.ts"></script>
  </body>
</html>
